version: 2

project_name: whoosh

before:
  hooks:
    - go mod download
    # The default (all plugins) binary is built from the cmd/whoosh module.
    - go mod download -C cmd/whoosh

release:
  prerelease: "false"

env:
  - CGO_ENABLED=0

builds:
  # Default binary with all bundled plugins.
  # Built from the cmd/whoosh module (its go.mod replaces the core + all plugins to the local checkout),
  # The ldflag target resolves to the core module via that replace.
  - id: linux
    dir: cmd/whoosh
    main: .
    binary: whoosh
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/yousysadmin/whoosh/internal/version.Version={{ .Version }}

  # macOS, Apple Silicon (arm64).
  - id: darwin
    dir: cmd/whoosh
    main: .
    binary: whoosh
    goos:
      - darwin
    goarch:
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/yousysadmin/whoosh/internal/version.Version={{ .Version }}

  # Core binary - only the core plugins, built from the root module.
  - id: core-linux
    main: ./cmd/whoosh-core
    binary: whoosh
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/yousysadmin/whoosh/internal/version.Version={{ .Version }}

  - id: core-darwin
    main: ./cmd/whoosh-core
    binary: whoosh
    goos:
      - darwin
    goarch:
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/yousysadmin/whoosh/internal/version.Version={{ .Version }}

archives:
  # whoosh_* archives - the default binary (all plugins).
  - id: default
    ids:
      - linux
      - darwin
    name_template: >-
      {{ .Binary }}_v{{ .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}amd64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: ['zip']

  # whoosh-core_* archives (binary inside is still named `whoosh`).
  - id: core
    ids:
      - core-linux
      - core-darwin
    name_template: >-
      whoosh-core_v{{ .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}amd64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

# Linux packages for the default (all plugins) binary.
nfpms:
  - ids: [linux]
    file_name_template: 'whoosh_v{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    maintainer: YouSysAdmin
    homepage: https://github.com/YouSysAdmin/whoosh
    description: A single-binary deployment tool
    license: "MIT"
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    section: utils
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/whoosh/copyright
        file_info:
          mode: 0644

# Homebrew formula for the default (all plugins) binary, published to the YouSysAdmin/homebrew-apps tap.
brews:
  - ids: [default]
    repository:
      owner: YouSysAdmin
      name: homebrew-apps
    directory: Formula
    homepage: https://github.com/YouSysAdmin/whoosh
    description: A single-binary deployment tool
    license: MIT

checksum:
  name_template: "checksums.sha256"

snapshot:
  version_template: "{{ .Tag }}-devel"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

dockers:
  # Default (all plugins) image, linux/amd64
  - ids: [linux]
    image_templates:
      - ghcr.io/yousysadmin/whoosh:{{ .Version }}-amd64
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - --platform=linux/amd64
      - --label=org.opencontainers.image.source=https://github.com/YouSysAdmin/whoosh
      - --label=org.opencontainers.image.version={{ .Version }}

  # Default (all plugins) image, linux/arm64
  - ids: [linux]
    image_templates:
      - ghcr.io/yousysadmin/whoosh:{{ .Version }}-arm64
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - --platform=linux/arm64
      - --label=org.opencontainers.image.source=https://github.com/YouSysAdmin/whoosh
      - --label=org.opencontainers.image.version={{ .Version }}

  # Core image, linux/amd64 - only the core plugins.
  - ids: [core-linux]
    image_templates:
      - ghcr.io/yousysadmin/whoosh:{{ .Version }}-core-amd64
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - --platform=linux/amd64
      - --label=org.opencontainers.image.source=https://github.com/YouSysAdmin/whoosh
      - --label=org.opencontainers.image.version={{ .Version }}-core

  # Core image, linux/arm64
  - ids: [core-linux]
    image_templates:
      - ghcr.io/yousysadmin/whoosh:{{ .Version }}-core-arm64
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - --platform=linux/arm64
      - --label=org.opencontainers.image.source=https://github.com/YouSysAdmin/whoosh
      - --label=org.opencontainers.image.version={{ .Version }}-core

docker_manifests:
  - name_template: ghcr.io/yousysadmin/whoosh:{{ .Version }}
    image_templates:
      - ghcr.io/yousysadmin/whoosh:{{ .Version }}-amd64
      - ghcr.io/yousysadmin/whoosh:{{ .Version }}-arm64
  - name_template: ghcr.io/yousysadmin/whoosh:latest
    image_templates:
      - ghcr.io/yousysadmin/whoosh:{{ .Version }}-amd64
      - ghcr.io/yousysadmin/whoosh:{{ .Version }}-arm64

  # Core multi-arch manifest - tagged {{ .Version }}-core (and latest-core).
  - name_template: ghcr.io/yousysadmin/whoosh:{{ .Version }}-core
    image_templates:
      - ghcr.io/yousysadmin/whoosh:{{ .Version }}-core-amd64
      - ghcr.io/yousysadmin/whoosh:{{ .Version }}-core-arm64
  - name_template: ghcr.io/yousysadmin/whoosh:latest-core
    image_templates:
      - ghcr.io/yousysadmin/whoosh:{{ .Version }}-core-amd64
      - ghcr.io/yousysadmin/whoosh:{{ .Version }}-core-arm64
