# ============================ Markup / output ============================
[markup]
[markup.goldmark.renderer]
unsafe = true
[markup.tableOfContents]
startLevel = 2
endLevel = 4
ordered = false
[markup.highlight]
style = "github-dark"
lineNos = false
noClasses = true
tabWidth = 2
codeFences = true
guessSyntax = true

[outputs]
home = ["HTML", "JSON"]   # JSON = the per-language client-side search index (layouts/index.json)
page = ["HTML"]
section = ["HTML"]

[taxonomies]
tag = "tags"
